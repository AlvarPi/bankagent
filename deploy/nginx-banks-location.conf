# Lisa gfc.genofin.ee serveriblokki ENNE location / { ... }
# Avalik ligipääs (ilma paroolita)
# /banks/api/advisor (panganõustaja) läheb samale 8765 serverile — eraldi /api/ proxyt pole vaja.

    location /banks/ {
        proxy_pass http://127.0.0.1:8765/banks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 500s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 500s;
    }
